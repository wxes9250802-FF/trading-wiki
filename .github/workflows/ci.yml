name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        env:
          # Skip t3-env validation — no real DB in CI
          SKIP_ENV_VALIDATION: "true"

      - name: Build
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: "true"
          # Next.js requires NEXT_PUBLIC vars at build time even with skip
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

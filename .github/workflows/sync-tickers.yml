name: Sync Tickers

on:
  schedule:
    # Daily at 07:00 UTC (15:00 Taipei time) — safely after TWSE/TPEx close (13:30 TST)
    # Runs Monday–Friday only; weekends have no new TWSE/TPEx data.
    - cron: "0 7 * * 1-5"

  # Allow manual trigger from GitHub Actions UI or API
  workflow_dispatch:

jobs:
  sync:
    name: Sync Tickers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync tickers
        run: bun run db:sync-tickers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # SERVICE_ROLE_KEY not needed here — sync uses direct DB writes via DATABASE_URL
          SKIP_ENV_VALIDATION: "true"

name: T11 — Verify Tips

on:
  schedule:
    # Daily at 02:00 UTC = 10:00 TST (after Taiwan and US market opens)
    - cron: "0 2 * * *"

  # Allow manual trigger from the Actions UI for testing / backfill runs
  workflow_dispatch:

# Only one run at a time — the worker updates rows by ID so concurrency
# would be safe, but a single daily run is all we need.
concurrency:
  group: verify-tips
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Tips
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run verification worker
        run: bun run ai:verify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # Skip Next.js env validation — standalone script
          SKIP_ENV_VALIDATION: "true"

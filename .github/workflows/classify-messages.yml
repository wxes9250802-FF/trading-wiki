name: Classify Messages

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum interval.
    # Note: scheduled runs may be delayed up to ~15 min during high GH load.
    - cron: "*/5 * * * *"

  # Trigger manually from the Actions UI or via GitHub API (e.g. from T5 webhook)
  workflow_dispatch:

# Only one run at a time — FOR UPDATE SKIP LOCKED handles concurrent workers,
# but a single runner is sufficient and cheaper.
concurrency:
  group: classify-messages
  cancel-in-progress: false

jobs:
  classify:
    name: Classify Messages
    runs-on: ubuntu-latest
    timeout-minutes: 8   # Must finish well within the 5-min window

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run classifier
        run: bun run ai:classify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # Skip Next.js env validation — this is a standalone script
          SKIP_ENV_VALIDATION: "true"

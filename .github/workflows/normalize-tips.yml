name: Normalize Tips to Traditional Chinese

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = preview diff, false = actually update)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: normalize-tips
  cancel-in-progress: false

jobs:
  normalize:
    name: Normalize tips summaries to Traditional Chinese
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run normalize
        run: bun run scripts/normalize-tips-to-traditional.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
          SKIP_ENV_VALIDATION: "true"

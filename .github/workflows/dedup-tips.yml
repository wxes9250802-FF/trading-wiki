name: Dedup Tips (Semantic)

# Manual-only: this is a destructive cleanup op.
# Run with DRY_RUN=true first, verify the log output, then re-run with
# DRY_RUN=false.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = preview only, false = actually delete)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      min_group_size:
        description: "Minimum tips per ticker to trigger clustering (default 2)"
        required: false
        default: "2"

concurrency:
  group: dedup-tips
  cancel-in-progress: false

jobs:
  dedup:
    name: Dedup tips by semantic similarity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run dedup
        run: bun run scripts/dedup-tips-semantic.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          MIN_GROUP_SIZE: ${{ inputs.min_group_size }}
          SKIP_ENV_VALIDATION: "true"
